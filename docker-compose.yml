services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: tradingbot-backend
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    env_file:
      - .env
    environment:
      - DATA_DIR=/persistent-data
    volumes:
      - ./backend:/app
      - ./predict-market-bot:/app/predict-market-bot
      - backend_data:/persistent-data
    ports:
      - "8080:8080"
    restart: unless-stopped

  frontend:
    image: node:20-alpine
    container_name: tradingbot-frontend
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    env_file:
      - .env
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started

volumes:
  backend_data:
